<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village Builder</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="https://www.pngkey.com/png/full/302-3020197_find-your-tribe-where-they-gather-village-icon.png">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Village Builder</h1>
        </header>
        <main>
            <section id="resources">
                <h2>Resources</h2>
                <p>Wood: <span id="wood">0</span></p>
                <p>Stone: <span id="stone">0</span></p>
                <p>Food: <span id="food">10</span></p>
            </section>

            <section id="population">
                <h2>Population</h2>
                <p>Villagers: <span id="villagers">0</span> / <span id="max-villagers">0</span></p>
                <button onclick="buyVillager()">Hire Villager (5 Food)</button>
            </section>

            <section id="actions">
                <h2>Actions</h2>
                <button onclick="gatherResource('wood')">Gather Wood</button>
                <button onclick="gatherResource('stone')">Gather Stone</button>
                <button onclick="gatherResource('food')">Gather Food</button>
            </section>

            <section id="buildings">
                <h2>Buildings</h2>
                <button onclick="build('house')">Build House (50 Wood, 30 Stone)</button>
                <button onclick="build('lumberMill')">Build Lumber Mill (100 Wood, 50 Stone)</button>
                <button onclick="build('quarry')">Build Quarry (150 Wood, 100 Stone)</button>
            </section>
        </main>
        <footer>
            <p>Log</p>
            <ul id="log-entries"></ul>
        </footer>
    </div>
    <script src="build.js"></script>
</body>
</html>
