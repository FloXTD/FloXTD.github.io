<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village Builder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <h1>Village Builder</h1>
        <div id="resources">
            <p>Wood: <span id="wood">0</span></p>
            <p>Stone: <span id="stone">0</span></p>
        </div>
        <div id="actions">
            <button id="collect-wood">Collect Wood</button>
            <button id="collect-stone">Collect Stone</button>
        </div>
        <div id="buildings">
            <h2>Build:</h2>
            <button id="build-hut">Build Hut (Cost: 10 Wood, 5 Stone)</button>
            <p>Huts: <span id="huts">0</span></p>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
