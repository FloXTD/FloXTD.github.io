<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Dark Place</title>
    <link rel="stylesheet" href="dark.css">
</head>
<body>
    <div id="game-container">
        <h1>A Dark Place</h1>
        <div id="story-section">
            <p id="story-text">You wake up in a dimly lit room. The air is cold, and the smell of damp stone fills your nostrils. A faint light flickers in the distance. What will you do?</p>
        </div>
        <div id="choices-section">
            <button class="choice-button" onclick="makeChoice('explore')">Explore the light</button>
            <button class="choice-button" onclick="makeChoice('wait')">Wait and observe</button>
        </div>
    </div>
    <script src="dark.js"></script>
</body>
</html>
