<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://cdn-icons-png.flaticon.com/512/6575/6575183.png">
    <title>Game Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .link-button {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px 0;
            font-size: 1.2rem;
            color: #ecf0f1;
            background-color: #3498db;
            text-decoration: none;
            border-radius: 5px;
            box-shadow: 0 4px #2980b9;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .link-button:hover {
            background-color: #2980b9;
        }

        .link-button:active {
            box-shadow: 0 2px #2980b9;
            transform: translateY(2px);
        }
    </style>
</head>
<body>
    <h1>Welcome to the Game Hub</h1>
    <a href="RPGGame.html" class="link-button">Play RPG Game</a>
    <a href="dark_place.html" class="link-button">Play A Dark Place</a>
    <a href="build.html" class="link-button">Play A build game</a>
</body>
</html>
