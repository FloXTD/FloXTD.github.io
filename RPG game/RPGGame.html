<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="story-container">
        <div id="story-section">
            <p id="story-text">Welcome to the world of Eldoria. Your journey begins...</p>
            <div id="story-options">
                <button id="story-next" onclick="nextStory()">Start Your Adventure</button>
            </div>
        </div>
    </div>

    <div id="game-container" style="display: none;">
        <div id="stats">
            <h3>Player Stats</h3>
            <p>Name: <span id="player-name"></span></p>
            <p>Health: <span id="player-health">100</span></p>
            <p>Mana: <span id="player-mana">50</span></p>
            <p>Stamina: <span id="player-stamina">75</span></p>
        </div>

        <div id="inventory">
            <h3>Inventory</h3>
            <ul id="inventory-list"></ul>
        </div>

        <div id="combat-actions">
            <h3>Actions</h3>
            <button onclick="attack()">Attack</button>
            <button onclick="castSpell()">Cast Spell</button>
            <button onclick="run()">Run</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
