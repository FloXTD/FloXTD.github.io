<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orinthia RPG Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <h1>Welcome to Orinthia RPG Game</h1>

        <div id="setup-section">
            <h2>Character Creation</h2>
            <label for="race-select">Choose your race:</label>
            <select id="race-select">
                <option value="human">Human</option>
                <option value="orc">Orc</option>
                <option value="elf">Elf</option>
            </select>
            <br><br>

            <label for="name-input">Enter your name:</label>
            <input type="text" id="name-input" placeholder="Enter your name">
            <br><br>

            <label for="class-select">Choose your class:</label>
            <select id="class-select">
                <option value="warrior">Warrior</option>
                <option value="rogue">Rogue</option>
                <option value="mage">Mage</option>
            </select>
            <br><br>

            <button class="button" onclick="startGame()">Start Game</button>
        </div>

        <div id="game-section" style="display: none;">
            <div id="player-info">
                <h2>Player Info</h2>
                <p>Name: <span id="player-name">Player</span></p>
                <p>Race: <span id="player-race">Human</span></p>
                <p>Class: <span id="player-class">Warrior</span></p>
                <p>Health: <span id="player-health">100</span></p>
                <p>Stamina: <span id="player-stamina">100</span></p>
                <p>Mana: <span id="player-mana">100</span></p>
                <p>Strength: <span id="player-strength">100</span></p>
                <p>Intelligence: <span id="player-intelligence">100</span></p>
            </div>

            <div id="monster-info">
                <h2>Monster Info</h2>
                <p>Name: <span id="monster-name">Goblin</span></p>
                <p>Health: <span id="monster-health">100</span></p>
            </div>

            <div id="battle-log">
                <h2>Battle Log</h2>
                <ul id="battle-entries"></ul>
            </div>

            <div id="action-buttons">
                <button class="button" onclick="attack()">Attack</button>
                <button class="button" onclick="run()">Run</button>
                <button class="button" onclick="castSpell()">Cast Spell</button>
            </div>
        </div>

        <div id="spell-choice" style="display: none;">
            <h2>Choose a Spell</h2>
            <button class="button" onclick="castFireball()">Fireball (25 Mana)</button>
            <button class="button" onclick="castLightningStrike()">Lightning Strike (40 Mana)</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
